name: Deploy MTProto Proxy Site

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run proxy checker
        run: python main.py

      - name: Validate generated JSON
        run: |
          python -c "import json; data = json.load(open('proxies.json', encoding='utf-8')); assert isinstance(data, dict), 'Expected JSON object'; assert isinstance(data.get('proxies'), list), 'Expected proxies list'; assert isinstance(data.get('last_update'), int), 'Expected integer last_update'; assert len(data['proxies']) > 0, 'Generated proxies list is empty'"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare static site artifact
        run: |
          mkdir -p site
          cp index.html app.js styles.css proxies.json site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
